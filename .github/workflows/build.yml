name: build

on:
  workflow_dispatch:

  push:
    branches:
      - '**'
    paths-ignore:
      - 'LICENSE'
      - '*.md'
      - '.github/**'
      - 'docs/**'
      - 'website/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v4

      - run: chmod 777 ./gradlew

      - run: ./gradlew publishToMavenLocal

      - run: ./gradlew :priv-sample:assembleRelease

      - uses: actions/upload-artifact@v7
        with:
          name: priv-kit-maven-local
          path: ~/.m2/repository/io/github/priv-kit
          include-hidden-files: true

      - uses: actions/upload-artifact@v7
        with:
          name: priv-sample-apk
          path: priv-sample/build/outputs/apk/release/priv-sample-release.apk
          if-no-files-found: error
          archive: false

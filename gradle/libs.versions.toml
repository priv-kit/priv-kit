[versions]
compileSdk = "37"
buildTools = "37.0.0"
minSdk = "26"
agp = "9.2.1"
kotlin = "2.4.0"
compose = "1.11.3"
activityCompose = "1.13.0"
core = "1.18.0"
boringssl = "20251124"
bouncycastle = "1.84"
hiddenApiBypass = "6.1"
junit = "4.13.2"
libcxx = "29.0.14206865"

[libraries]
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "activityCompose" }
androidx-compose-foundation = { module = "androidx.compose.foundation:foundation", version.ref = "compose" }
androidx-compose-runtime = { module = "androidx.compose.runtime:runtime", version.ref = "compose" }
androidx-compose-ui = { module = "androidx.compose.ui:ui", version.ref = "compose" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "core" }
boringssl = { module = "io.github.vvb2060.ndk:boringssl", version.ref = "boringssl" }
bouncycastle-bcpkix = { module = "org.bouncycastle:bcpkix-jdk18on", version.ref = "bouncycastle" }
hiddenapibypass = { module = "org.lsposed.hiddenapibypass:hiddenapibypass", version.ref = "hiddenApiBypass" }
junit = { module = "junit:junit", version.ref = "junit" }
libcxx = { module = "org.lsposed.libcxx:libcxx", version.ref = "libcxx" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
